version: '3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    # Explicitly use host network at runtime if DNS is failing on the bridge
    network_mode: "host" 
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # Note: When using network_mode: host, the 'ports' mapping is ignored 
    # because the container uses the host's IP directly.
    # ports:
    # - "1007:1007"
    restart: always
    volumes:
      - .:/jmath
    command: ["sh", "-c", "chmod +x ./main.sh && ./main.sh"]